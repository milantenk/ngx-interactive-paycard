language: node_js
node_js:
 - "20"
before_install:
 - npx playwright install --with-deps
script:
 - npm run lint:lib
 - npm run test:lib:ci
 - npm run test:e2e
before_deploy:
 - npm run build:lib:prod
 - cd dist/ngx-interactive-paycard-lib
deploy:
 provider: npm
 email: "$NPM_EMAIL"
 api:key: "$NPM_API_TOKEN"
 skip_cleanup: true
 on:
  tags: true